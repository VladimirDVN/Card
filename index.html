<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D открытка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/card.css" />
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="index.html">← Галерея</a>
    <span class="topbar__title">3D открытка</span>
    <div class="topbar__actions">
      <button type="button" id="card-save-png" class="topbar__btn">
        Сохранить открытку
      </button>
      <button type="button" id="card-save-pdf" class="topbar__btn topbar__btn--ghost" title="Откроется диалог печати — выберите «Сохранить как PDF»">
        PDF
      </button>
      <button
        type="button"
        id="card-save-glb"
        class="topbar__btn topbar__btn--ghost"
        title="Сохранить 3d-otkrytka.glb — открыть в view-glb.html для просмотра"
      >
        GLB (3D + текст)
      </button>
    </div>
  </header>

  <main class="postcard-wrap">
    <article class="postcard" aria-label="Открытка с букетом и текстом">
      <div class="postcard__ornament" aria-hidden="true"></div>

      <div class="postcard__flow">
        <!-- float первым — текст обтекает букет слева и справа -->
        <figure class="postcard__bouquet" aria-label="3D букет «»">
          <figcaption class="postcard__bouquet-label"> </figcaption>
          <p id="card-scene-status" class="postcard__scene-status">Загрузка букета…</p>
          <div id="card-scene" class="postcard__viewport"></div>
          <p class="postcard__hint">Вращайте букет мышью или пальцем</p>
        </figure>

        <div id="card-text" class="postcard__copy" aria-live="polite">
          <p class="postcard__loading">Загрузка текста…</p>
        </div>
      </div>

    </article>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/card.js?v=9"></script>
</body>
</html>
